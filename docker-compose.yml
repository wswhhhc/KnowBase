services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: knowbase
      POSTGRES_USER: knowbase
      POSTGRES_PASSWORD: knowbase_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    working_dir: /app/backend
    env_file:
      - ./backend/.env
    environment:
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend:/app/backend
      - backend_venv:/app/backend/.venv
    command: uv run uvicorn src.api.main:app --reload --host 0.0.0.0 --port 8000

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    working_dir: /app/backend
    env_file:
      - ./backend/.env
    environment:
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend:/app/backend
      - backend_venv:/app/backend/.venv
    command: uv run python -m src.jobs.worker

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    working_dir: /app/frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8000
      VITE_API_PROXY_TARGET: http://backend:8000
    depends_on:
      - backend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app/frontend
      - frontend_node_modules:/app/frontend/node_modules
    command: npm run dev -- --host 0.0.0.0 --port 5173

volumes:
  postgres_data:
  redis_data:
  backend_venv:
  frontend_node_modules:
